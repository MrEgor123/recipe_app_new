services:
  db:
    image: postgres:16
    env_file:
      - ./env/db.env.example
    ports:
      - "5433:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/data

  backend:
    image: python:3.12-slim
    working_dir: /app
    env_file:
      - ./env/backend.env.example
    volumes:
      - ../backend:/app
    depends_on:
      - db
    ports:
      - "8000:8000"
    command: >
      bash -lc "
      pip install -U pip &&
      pip install -e . &&
      alembic upgrade head &&
      PYTHONPATH=/app/src uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
      "

  frontend-build:
    image: node:18-alpine
    working_dir: /frontend
    volumes:
      - ../frontend:/frontend
      - frontend_build:/frontend/result_build
    command: >
      sh -lc "
      rm -rf build &&
      mkdir -p result_build &&
      rm -rf result_build/* &&
      npm install --legacy-peer-deps &&
      npm run build &&
      cp -r build/* result_build/
      "

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend-build
    ports:
      - "8080:80"
    volumes:
      - frontend_build:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pg_data_dev:
  frontend_build: