server {
    listen 80;
    server_name localhost;

    # --- FIX 413 ---
    # ставим с запасом (если картинка в base64, она быстро растёт)
    client_max_body_size 50m;

    # иногда 413 может прилетать из-за буферов при больших заголовках/телах
    client_body_buffer_size 1m;

    # React SPA
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    # FastAPI (Foodgram-compatible)
    location /api/ {
        # на всякий случай продублируем и тут
        client_max_body_size 50m;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # если тело большое, лучше увеличить буферы
        proxy_buffering off;
        proxy_request_buffering off;

        proxy_pass http://backend:8000/api/;
    }

    # Short links redirect
    location /s/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://backend:8000/s/;
    }

    location /health {
        proxy_pass http://backend:8000/health;
    }

    location /admin/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://backend:8000/admin/;
    }
}